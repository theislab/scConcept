defaults:
  - model: ContrastiveModel
  - datamodule: DataModuleBasic
  - _self_

wandb:
  enabled: False
  run_name: null # Required if enabled=True
  entity: null  # Required if enabled=True
  project: null  # Required if enabled=True

initialize:  
  resume: False
  run_id: null
  checkpoint: null
  create_new_run: False

profiler:
  enabled: False # Use profiler only for debugging
  
PATH:
  PROJECT_PATH: ???
  PROJECT_DATA_PATH: ${PATH.PROJECT_PATH}/data
  CHECKPOINT_ROOT: ${PATH.PROJECT_PATH}/model_checkpoints
  DATASET_PATH: ${PATH.PROJECT_DATA_PATH}/cxg_raw_2023-12-15
  ADATA_PATH: ${PATH.DATASET_PATH}/h5ads
  LOCAL_DIR: null # If not None, copy files to this directory for faster training
  PANELS_PATH: ${PATH.PROJECT_PATH}/panels/hsapiens
  GENE_MAPPING_PATH: ${PATH.DATASET_PATH}/pc_gene_token_mapping.csv
  PRETRAINED_VOCABULARY: null



# Project directory structure:
# PROJECT_PATH/
# ├── data/
# │   └── <dataset_name>/
# │       ├── pc_gene_token_mapping.pkl
# │       └── h5ads/
# │           ├── <adata_1>.h5ad
# │           ├── <adata_2>.h5ad
# │           └── ...
# ├── model_checkpoints/
# └── panels/
#     └── <panel_name>/
#         ├── panel_1.csv
#         ├── panel_2.csv
#         └── ...
