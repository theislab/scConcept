  - split_cellxgene_cjacchus: split_cellxgene_cjacchus_2025_11_08_primary
  - split_cellxgene_mmulatta: split_cellxgene_mmulatta_2025_11_08_primary
  - split_cellxgene_ptroglodytes: split_cellxgene_ptroglodytes_2025_11_08_primary

  - split_scbasecount_hsapiens: split_scbasecount_hsapiens_2025_02_25
  - split_scbasecount_mmusculus: split_scbasecount_mmusculus_2025_02_25
  - split_scbasecount_mmulatta: split_scbasecount_mmulatta_2025_02_25
  - split_scbasecount_cjacchus: split_scbasecount_cjacchus_2025_02_25
  - split_scbasecount_ptroglodytes: split_scbasecount_ptroglodytes_2025_02_25
  - split_scbasecount_btaurus: split_scbasecount_btaurus_2025_02_25
  - split_scbasecount_celegans: split_scbasecount_celegans_2025_02_25
  - split_scbasecount_drerio: split_scbasecount_drerio_2025_02_25
  - split_scbasecount_dmelanogaster: split_scbasecount_dmelanogaster_2025_02_25
  - split_scbasecount_ecaballus: split_scbasecount_ecaballus_2025_02_25
  - split_scbasecount_ggallus: split_scbasecount_ggallus_2025_02_25
